name: weekly

# Weekly concierge: HARVEST -> FIND -> SKEPTIC -> anti-repeat -> CONCIERGE -> email.
# Always sends Friday morning (weekly ritual; evergreen fallback guarantees content).

on:
  schedule:
    - cron: "0 6 * * 5"     # 09:00 EEST (Bulgaria summer time, UTC+3)
    - cron: "0 7 * * 5"     # 09:00 EET (Bulgaria winter time, UTC+2)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-concierge
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER:      ${{ vars.LLM_PROVIDER }}
      SMTP_HOST:         ${{ secrets.SMTP_HOST }}
      SMTP_PORT:         ${{ secrets.SMTP_PORT }}
      SMTP_USER:         ${{ secrets.SMTP_USER }}
      SMTP_PASS:         ${{ secrets.SMTP_PASS }}
      EMAIL_TO:          ${{ secrets.EMAIL_TO }}
      EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Skip the wrong-DST-season scheduled trigger
        if: github.event_name == 'schedule'
        run: |
          hour=$(TZ='Europe/Sofia' date +%H)
          if [ "$hour" != "09" ]; then
            echo "Sofia local hour is $hour, not 09 — this cron fired for the other DST season, skipping."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Run weekend_concierge.py (harvest + three-stage LLM gate)
        if: env.SKIP != 'true'
        run: python weekend_concierge.py

      - name: Persist state
        if: env.SKIP != 'true'
        run: |
          git config user.name "weekly-concierge"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git commit -m "update state [skip ci]" || echo "no changes"
          git pull --rebase origin main || echo "nothing to rebase"
          git push
